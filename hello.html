<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>DAT Load Helper</title>
  <style>
    body { font-family: Arial, sans-serif; width: 380px; padding: 12px; background: #f9f9f9; }
    h2 { margin: 0 0 10px; color: #1a73e8; }
    .card { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .value { font-weight: bold; font-size: 14px; color: #222; }
    .status { font-size: 12px; color: #555; margin-top: 8px; }
    button { width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: none; background: #1a73e8; color: white; font-size: 13px; cursor: pointer; }
    button:hover { background: #1558b0; }
    button.red { background: #e53935; }
    button.red:hover { background: #b71c1c; }
    button.green { background: #2e7d32; }
    button.green:hover { background: #1b5e20; }
    .list { margin-top: 8px; }
    .item { border:1px solid #ddd; border-radius:8px; padding:8px; margin-bottom:6px; font-size:11px; }
    .muted { color:#777; font-size:11px; }
  </style>
</head>
<body>

  <h2>🚛 DAT Load Helper</h2>

  <div class="card">
    <div class="label">Current Page</div>
    <div class="value" id="site">Loading...</div>
    <div class="label" style="margin-top:6px;">Page Title</div>
    <div class="value" id="pageTitle" style="font-size:12px; color:#555;"></div>
    <div class="status" id="status"></div>
  </div>

  <div class="card">
    <div class="label">Captured Loads (from DAT page)</div>
    <button class="green" id="btnScan">🔍 Scan / Refresh Captured Loads</button>
    <div class="status" id="capturedStatus">Not scanned yet.</div>
    <div class="list" id="capturedList"></div>
  </div>

  <div class="card">
    <div class="label">Saved Loads</div>
    <button id="btnSave">💾 Save Captured Loads</button>
    <button class="red" id="btnClear">🗑️ Clear Saved Loads</button>
    <div class="status" id="savedStatus">No loads saved yet.</div>
    <div class="list" id="savedList"></div>
    <button id="btnExport">📤 Export Saved to CSV (Loadex)</button>
    <button class="ghost" id="exportBtn">📤 Export CSV</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
